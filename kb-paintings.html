<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KB — Painting Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:    #ffffff;
      --off:      #f7f6f4;
      --light:    #eeece8;
      --rule:     #dddbd6;
      --muted:    #b0ada6;
      --mid:      #888580;
      --dark:     #2c2b28;
      --ink:      #1a1917;
      --accent:   #1a1917;
    }

    html, body {
      min-height: 100%;
      background: var(--white);
      font-family: 'Space Mono', monospace;
      color: var(--ink);
    }

    /* App shell */
    .app { min-height: 100vh; }

    /* Header */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--rule);
      padding: 2rem 2.5rem 1.5rem;
      position: sticky; top: 0; z-index: 50;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 1.25rem;
    }

    .header-title {
      font-family: 'Cormorant SC', serif;
      font-size: 36px;
      font-weight: 300;
      letter-spacing: 8px;
      color: var(--ink);
      line-height: 1;
    }

    .header-sub {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 5px;
    }

    .stats { display: flex; gap: 2rem; }

    .stat { text-align: right; }

    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      color: var(--ink);
      line-height: 1;
    }

    .stat-label {
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .toolbar-left { display: flex; gap: 0.35rem; align-items: center; flex-wrap: wrap; }
    .toolbar-right { display: flex; gap: 0.5rem; align-items: center; }

    .filter-btn {
      font-family: 'Space Mono', monospace;
      font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
      background: none; border: 1px solid var(--rule);
      color: var(--muted); padding: 5px 12px; cursor: pointer;
      transition: all 0.15s; border-radius: 1px;
    }

    .filter-btn:hover { border-color: var(--mid); color: var(--dark); }
    .filter-btn.active { border-color: var(--ink); color: var(--ink); background: var(--ink); color: var(--white); }

    .search-input {
      background: var(--off);
      border: 1px solid var(--rule);
      color: var(--ink);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      padding: 6px 12px;
      outline: none;
      width: 220px;
      transition: border-color 0.15s;
      border-radius: 1px;
    }

    .search-input:focus { border-color: var(--mid); }
    .search-input::placeholder { color: var(--muted); }

    .view-toggle { display: flex; }

    .view-btn {
      background: none;
      border: 1px solid var(--rule);
      color: var(--muted);
      padding: 5px 11px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 14px;
    }

    .view-btn:first-child { border-radius: 1px 0 0 1px; border-right: none; }
    .view-btn:last-child  { border-radius: 0 1px 1px 0; }
    .view-btn.active { background: var(--ink); border-color: var(--ink); color: var(--white); }

    .add-btn {
      font-family: 'Space Mono', monospace;
      font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
      background: var(--ink); border: 1px solid var(--ink);
      color: var(--white); padding: 7px 18px; cursor: pointer;
      border-radius: 1px; transition: opacity 0.15s;
    }

    .add-btn:hover { opacity: 0.8; }

    /* Main content */
    .main { padding: 2rem 2.5rem; }

    /* Gallery Grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    .painting-card {
      cursor: pointer;
      transition: transform 0.2s;
    }

    .painting-card:hover { transform: translateY(-3px); }

    .card-img {
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: var(--light);
      margin-bottom: 0.85rem;
      position: relative;
    }

    .card-img img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.4s;
    }

    .painting-card:hover .card-img img { transform: scale(1.03); }

    .card-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; background: var(--light);
    }

    .placeholder-icon { font-size: 32px; opacity: 0.2; }
    .placeholder-text { font-size: 8px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

    .card-body {}

    .card-title {
      font-family: 'Cormorant SC', serif;
      font-size: 15px; font-weight: 400;
      color: var(--ink); margin-bottom: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .card-meta {
      font-size: 9px; color: var(--muted);
      letter-spacing: 1px; margin-bottom: 6px;
    }

    .card-footer { display: flex; justify-content: space-between; align-items: center; }

    .card-status {
      font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
      padding: 2px 8px; display: inline-block;
      border: 1px solid currentColor; border-radius: 1px;
    }

    .card-price { font-size: 11px; color: var(--mid); }

    /* Status colors — subtle on white */
    .s-available { color: #2d7a4f; }
    .s-sold      { color: #888580; }
    .s-gifted    { color: #6b5fa8; }
    .s-display   { color: #b07a2a; }
    .s-wip       { color: #b05a2a; }

    /* List View */
    .list-view { display: none; }

    .list-view table { width: 100%; border-collapse: collapse; }

    .list-view thead tr { border-bottom: 1px solid var(--rule); }

    .list-view th {
      font-size: 8px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); padding: 0.6rem 1rem;
      text-align: left; cursor: pointer; white-space: nowrap;
      font-weight: 400;
    }

    .list-view th:hover { color: var(--ink); }

    .list-view td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--light);
      color: var(--dark); font-size: 12px;
      vertical-align: middle;
    }

    .list-view tr:hover td { background: var(--off); cursor: pointer; }

    .list-thumb-wrap {
      width: 56px; height: 42px;
      overflow: hidden; background: var(--light);
      flex-shrink: 0; border-radius: 1px;
    }

    .list-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }

    .list-title {
      font-family: 'Cormorant SC', serif;
      font-size: 14px; color: var(--ink);
    }

    /* Detail Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.92);
      display: none; align-items: center; justify-content: center;
      z-index: 100; padding: 2rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--white);
      border: 1px solid var(--rule);
      width: 100%; max-width: 820px;
      max-height: 90vh; overflow-y: auto;
      position: relative;
      box-shadow: 0 8px 48px rgba(0,0,0,0.08);
    }

    .modal-close {
      position: absolute; top: 1.25rem; right: 1.25rem;
      background: none; border: none; color: var(--muted);
      font-size: 18px; cursor: pointer; z-index: 10;
      transition: color 0.15s; line-height: 1;
    }

    .modal-close:hover { color: var(--ink); }

    .modal-body { display: grid; grid-template-columns: 1.1fr 1fr; }

    .modal-img-wrap {
      aspect-ratio: 1;
      background: var(--light);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    .modal-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .modal-img-placeholder { font-size: 56px; opacity: 0.1; }

    .modal-info { padding: 2rem; }

    .modal-status-bar { margin-bottom: 1.25rem; }

    .modal-title {
      font-family: 'Cormorant SC', serif;
      font-size: 28px; font-weight: 400;
      color: var(--ink); line-height: 1.2; margin-bottom: 4px;
    }

    .modal-year {
      font-size: 9px; letter-spacing: 3px;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .modal-divider { border: none; border-top: 1px solid var(--light); margin: 1rem 0; }

    .modal-field { margin-bottom: 1rem; }
    .modal-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
    .modal-value { font-size: 13px; color: var(--dark); }

    .modal-notes {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 16px;
      color: var(--ink); line-height: 1.7;
      border-left: 1px solid var(--rule);
      padding-left: 0.85rem; margin-top: 1rem;
    }

    .modal-actions { display: flex; gap: 8px; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--light); }

    .modal-btn {
      font-family: 'Space Mono', monospace;
      font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
      background: none; border: 1px solid var(--rule);
      color: var(--mid); padding: 6px 14px; cursor: pointer;
      border-radius: 1px; transition: all 0.15s;
    }

    .modal-btn:hover { border-color: var(--ink); color: var(--ink); }
    .modal-btn.danger:hover { border-color: #c0392b; color: #c0392b; }

    /* Form */
    .form-overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.95);
      display: none; align-items: center; justify-content: center;
      z-index: 200; padding: 2rem;
    }

    .form-overlay.open { display: flex; }

    .form-box {
      background: var(--white);
      border: 1px solid var(--rule);
      width: 100%; max-width: 540px;
      max-height: 90vh; overflow-y: auto;
      padding: 2rem; position: relative;
      box-shadow: 0 8px 48px rgba(0,0,0,0.07);
    }

    .form-heading {
      font-family: 'Cormorant SC', serif;
      font-size: 22px; font-weight: 300;
      letter-spacing: 4px; color: var(--ink);
      margin-bottom: 1.75rem;
    }

    .form-row { margin-bottom: 1rem; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }

    .form-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; display: block; }

    .form-input, .form-select, .form-textarea {
      width: 100%; background: var(--off);
      border: 1px solid var(--rule);
      color: var(--ink); font-family: 'Space Mono', monospace;
      font-size: 11px; padding: 8px 10px; outline: none;
      transition: border-color 0.15s; border-radius: 1px;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--mid); background: var(--white); }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--muted); }
    .form-select option { background: var(--white); }
    .form-textarea { resize: vertical; min-height: 80px; font-family: 'Cormorant Garamond', serif; font-size: 14px; }

    .form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.75rem; padding-top: 1rem; border-top: 1px solid var(--light); }

    .btn-cancel {
      font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px;
      text-transform: uppercase; background: none; border: 1px solid var(--rule);
      color: var(--muted); padding: 8px 16px; cursor: pointer; border-radius: 1px; transition: all 0.15s;
    }

    .btn-cancel:hover { color: var(--ink); border-color: var(--mid); }

    .btn-save {
      font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px;
      text-transform: uppercase; background: var(--ink);
      border: 1px solid var(--ink); color: var(--white);
      padding: 8px 20px; cursor: pointer; border-radius: 1px; transition: opacity 0.15s;
    }

    .btn-save:hover { opacity: 0.8; }

    /* Empty state */
    .empty-state {
      grid-column: 1/-1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 6rem 2rem; gap: 1rem; text-align: center;
    }

    .empty-icon { font-size: 48px; opacity: 0.12; }

    .empty-title {
      font-family: 'Cormorant SC', serif;
      font-size: 20px; font-weight: 300;
      letter-spacing: 4px; color: var(--mid);
    }

    .empty-text { font-size: 10px; color: var(--muted); letter-spacing: 1px; }

    .empty-add {
      font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px;
      text-transform: uppercase; background: var(--ink); border: 1px solid var(--ink);
      color: var(--white); padding: 9px 22px; cursor: pointer; border-radius: 1px;
      margin-top: 0.5rem; transition: opacity 0.15s;
    }

    .empty-add:hover { opacity: 0.8; }

    /* Toast */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--ink); color: var(--white);
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      padding: 10px 18px; border-radius: 1px;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
    }

    #toast.show { opacity: 1; }

    .no-results {
      grid-column: 1/-1; padding: 3rem; text-align: center;
      color: var(--muted); font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    }

    /* Drag and drop */
    .painting-card { position: relative; }

    .drag-handle {
      position: absolute; top: 8px; right: 8px;
      width: 26px; height: 26px;
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--rule);
      border-radius: 1px;
      display: flex; align-items: center; justify-content: center;
      cursor: grab; z-index: 5;
      opacity: 0; transition: opacity 0.15s;
      font-size: 11px; color: var(--mid);
    }

    .painting-card:hover .drag-handle { opacity: 1; }
    .drag-handle:active { cursor: grabbing; }

    .painting-card.dragging { opacity: 0.35; }

    .painting-card.drag-over {
      outline: 1px solid var(--ink);
      transform: translateY(-3px);
    }

    .drag-hint {
      font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); text-align: right;
      margin-bottom: 0.75rem; display: none;
    }

    .drag-hint.visible { display: block; }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">Painting Archive</div>
        <div class="header-sub">Krystal Banner — Catalog Raisonné</div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-num" id="totalCount">0</div>
          <div class="stat-label">Works</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="availCount">0</div>
          <div class="stat-label">Available</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="soldCount">0</div>
          <div class="stat-label">Sold</div>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" id="searchInput" placeholder="Search title, medium, year..." oninput="renderAll()">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('available', this)">Available</button>
        <button class="filter-btn" onclick="setFilter('sold', this)">Sold</button>
        <button class="filter-btn" onclick="setFilter('gifted', this)">Gifted</button>
        <button class="filter-btn" onclick="setFilter('display', this)">On Display</button>
        <button class="filter-btn" onclick="setFilter('wip', this)">WIP</button>
      </div>
      <div class="toolbar-right">
        <div class="view-toggle">
          <button class="view-btn active" id="gridBtn" onclick="setView('grid')" title="Gallery">▦</button>
          <button class="view-btn" id="listBtn" onclick="setView('list')" title="List">☰</button>
        </div>
        <button class="add-btn" onclick="openForm()">+ Add Painting</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="drag-hint" id="dragHint">⠿ Drag to reorder</div>
    <div class="gallery-grid" id="galleryGrid"></div>
    <div class="list-view" id="listView">
      <table>
        <thead>
          <tr>
            <th style="width:70px"></th>
            <th onclick="sortBy('title')">Title ↕</th>
            <th onclick="sortBy('year')">Year ↕</th>
            <th>Medium</th>
            <th>Dimensions</th>
            <th onclick="sortBy('status')">Status ↕</th>
            <th onclick="sortBy('price')">Price ↕</th>
          </tr>
        </thead>
        <tbody id="listBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-body">
      <div class="modal-img-wrap" id="modalImgWrap"></div>
      <div class="modal-info">
        <div class="card-status modal-status-bar" id="modalStatusBadge"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-year" id="modalYear"></div>
        <hr class="modal-divider">
        <div class="modal-field"><div class="modal-label">Medium</div><div class="modal-value" id="modalMedium"></div></div>
        <div class="modal-field"><div class="modal-label">Dimensions</div><div class="modal-value" id="modalDimensions"></div></div>
        <div class="modal-field" id="modalPriceWrap"><div class="modal-label">Price</div><div class="modal-value" id="modalPrice"></div></div>
        <div class="modal-notes" id="modalNotes"></div>
        <div class="modal-actions">
          <button class="modal-btn" onclick="editCurrent()">Edit</button>
          <button class="modal-btn danger" onclick="deleteCurrent()">Delete</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add / Edit Form -->
<div class="form-overlay" id="formOverlay">
  <div class="form-box">
    <button class="modal-close" onclick="closeForm()">✕</button>
    <div class="form-heading" id="formHeading">Add Painting</div>

    <div class="form-row">
      <label class="form-label">Title *</label>
      <input class="form-input" id="fTitle" placeholder="Painting title">
    </div>
    <div class="form-row-2">
      <div>
        <label class="form-label">Year</label>
        <input class="form-input" id="fYear" placeholder="2024" type="number" min="1900" max="2099">
      </div>
      <div>
        <label class="form-label">Status</label>
        <select class="form-select" id="fStatus">
          <option value="available">Available</option>
          <option value="sold">Sold</option>
          <option value="gifted">Gifted</option>
          <option value="display">On Display</option>
          <option value="wip">Work in Progress</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Medium</label>
      <input class="form-input" id="fMedium" placeholder="e.g. Acrylic on canvas">
    </div>
    <div class="form-row-2">
      <div>
        <label class="form-label">Dimensions</label>
        <input class="form-input" id="fDimensions" placeholder='e.g. 24" × 36"'>
      </div>
      <div>
        <label class="form-label">Price ($)</label>
        <input class="form-input" id="fPrice" placeholder="e.g. 1200" type="number" min="0">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Image URL</label>
      <input class="form-input" id="fImage" placeholder="Paste link from Google Drive, Instagram, etc.">
    </div>
    <div class="form-row">
      <label class="form-label">Notes / Story</label>
      <textarea class="form-textarea" id="fNotes" placeholder="The story behind this piece, inspiration, context..."></textarea>
    </div>

    <div class="form-actions">
      <button class="btn-cancel" onclick="closeForm()">Cancel</button>
      <button class="btn-save" onclick="savePainting()">Save Painting</button>
    </div>
  </div>
</div>

<div id="toast">Saved</div>

<script>
  const STORE_KEY = 'kb-paintings';
  let paintings = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
  let currentFilter = 'all';
  let currentView = 'grid';
  let sortKey = null;
  let sortDir = 1;
  let currentIdx = null;
  let editingId = null;

  // Seed with one example so the gallery isn't empty
  if (paintings.length === 0) {
    paintings = [{
      id: Date.now(),
      title: 'Example — Add Your First Painting',
      year: new Date().getFullYear(),
      medium: 'Click the edit button to update this entry',
      dimensions: '',
      status: 'available',
      price: '',
      image: '',
      notes: 'This is a placeholder. Edit or delete it and add your own work.'
    }];
    save();
  }

  function save() { localStorage.setItem(STORE_KEY, JSON.stringify(paintings)); }

  function statusLabel(s) {
    return { available: 'Available', sold: 'Sold', gifted: 'Gifted', display: 'On Display', wip: 'In Progress' }[s] || s;
  }

  function statusClass(s) {
    return { available: 's-available', sold: 's-sold', gifted: 's-gifted', display: 's-display', wip: 's-wip' }[s] || '';
  }

  function updateStats() {
    document.getElementById('totalCount').textContent = paintings.length;
    document.getElementById('availCount').textContent = paintings.filter(p => p.status === 'available').length;
    document.getElementById('soldCount').textContent  = paintings.filter(p => p.status === 'sold').length;
  }

  function getFiltered() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    return paintings
      .filter(p => currentFilter === 'all' || p.status === currentFilter)
      .filter(p => !q || p.title.toLowerCase().includes(q) || (p.medium||'').toLowerCase().includes(q) || String(p.year||'').includes(q));
  }

  function renderAll() {
    updateStats();
    const list = getFiltered();

    if (sortKey) {
      list.sort((a, b) => {
        const av = a[sortKey] || ''; const bv = b[sortKey] || '';
        return av < bv ? -sortDir : av > bv ? sortDir : 0;
      });
    }

    renderGrid(list);
    renderList(list);
  }

  function imgEl(p, cls) {
    if (p.image) {
      return `<img src="${p.image}" alt="${p.title}" class="${cls}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`;
    }
    return '';
  }

  function renderGrid(list) {
    const grid = document.getElementById('galleryGrid');
    const hint = document.getElementById('dragHint');

    if (!list.length) {
      grid.innerHTML = `<div class="no-results">No paintings found</div>`;
      hint.classList.remove('visible');
      return;
    }

    // Only show drag hint in grid view with no active filter/search
    const q = document.getElementById('searchInput').value;
    hint.classList.toggle('visible', currentView === 'grid' && currentFilter === 'all' && !q);

    grid.innerHTML = list.map((p) => {
      const realIdx = paintings.indexOf(p);
      return `
        <div class="painting-card" draggable="true" data-id="${p.id}" data-idx="${realIdx}">
          <div class="drag-handle" title="Drag to reorder">⠿</div>
          <div class="card-img" onclick="openDetail(${realIdx})">
            ${p.image
              ? `<img src="${p.image}" alt="${p.title}" onerror="this.parentElement.innerHTML='<div class=card-placeholder><div class=placeholder-icon>🖼</div><div class=placeholder-text>No image</div></div>'">`
              : `<div class="card-placeholder"><div class="placeholder-icon">🖼</div><div class="placeholder-text">No image</div></div>`
            }
          </div>
          <div class="card-body" onclick="openDetail(${realIdx})">
            <div class="card-title">${p.title}</div>
            <div class="card-meta">${[p.year, p.medium].filter(Boolean).join(' · ')}</div>
            <div class="card-footer">
              <span class="card-status ${statusClass(p.status)}">${statusLabel(p.status)}</span>
              ${p.price ? `<span class="card-price">$${Number(p.price).toLocaleString()}</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');

    initDrag();
  }

  // Drag and drop
  let dragSrcId = null;

  function initDrag() {
    const cards = document.querySelectorAll('.painting-card[draggable]');

    cards.forEach(card => {
      // Start drag only from handle
      card.querySelector('.drag-handle').addEventListener('mousedown', () => {
        card.setAttribute('draggable', 'true');
      });

      card.addEventListener('dragstart', e => {
        dragSrcId = card.dataset.id;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });

      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        document.querySelectorAll('.painting-card').forEach(c => c.classList.remove('drag-over'));
      });

      card.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        document.querySelectorAll('.painting-card').forEach(c => c.classList.remove('drag-over'));
        if (card.dataset.id !== dragSrcId) card.classList.add('drag-over');
      });

      card.addEventListener('dragleave', () => {
        card.classList.remove('drag-over');
      });

      card.addEventListener('drop', e => {
        e.preventDefault();
        card.classList.remove('drag-over');
        if (!dragSrcId || card.dataset.id === dragSrcId) return;

        const fromIdx = paintings.findIndex(p => String(p.id) === String(dragSrcId));
        const toIdx   = paintings.findIndex(p => String(p.id) === String(card.dataset.id));
        if (fromIdx === -1 || toIdx === -1) return;

        // Reorder
        const [moved] = paintings.splice(fromIdx, 1);
        paintings.splice(toIdx, 0, moved);
        save();
        renderAll();
        showToast('Order saved');
      });
    });
  }

  function renderList(list) {
    const body = document.getElementById('listBody');
    if (!list.length) { body.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase">No paintings found</td></tr>`; return; }
    body.innerHTML = list.map(p => `
      <tr onclick="openDetail(${paintings.indexOf(p)})">
        <td>
          <div class="list-thumb-wrap">
            ${p.image ? `<img src="${p.image}" alt="${p.title}">` : ''}
          </div>
        </td>
        <td><div class="list-title">${p.title}</div></td>
        <td>${p.year || '—'}</td>
        <td>${p.medium || '—'}</td>
        <td>${p.dimensions || '—'}</td>
        <td><span class="card-status ${statusClass(p.status)}">${statusLabel(p.status)}</span></td>
        <td>${p.price ? '$' + Number(p.price).toLocaleString() : '—'}</td>
      </tr>
    `).join('');
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAll();
  }

  function setView(v) {
    currentView = v;
    document.getElementById('galleryGrid').style.display = v === 'grid' ? 'grid' : 'none';
    document.getElementById('listView').style.display    = v === 'list' ? 'block' : 'none';
    document.getElementById('gridBtn').classList.toggle('active', v === 'grid');
    document.getElementById('listBtn').classList.toggle('active', v === 'list');
  }

  function sortBy(key) {
    if (sortKey === key) sortDir *= -1;
    else { sortKey = key; sortDir = 1; }
    renderAll();
  }

  function openDetail(idx) {
    currentIdx = idx;
    const p = paintings[idx];
    const wrap = document.getElementById('modalImgWrap');
    wrap.innerHTML = p.image
      ? `<img src="${p.image}" alt="${p.title}" onerror="this.parentElement.innerHTML='<div class=modal-img-placeholder>🖼</div>'">`
      : `<div class="modal-img-placeholder">🖼</div>`;

    document.getElementById('modalTitle').textContent = p.title;
    document.getElementById('modalYear').textContent  = [p.year, p.dimensions].filter(Boolean).join(' · ');
    document.getElementById('modalMedium').textContent     = p.medium || '—';
    document.getElementById('modalDimensions').textContent = p.dimensions || '—';

    const badge = document.getElementById('modalStatusBadge');
    badge.textContent  = statusLabel(p.status);
    badge.className    = `card-status ${statusClass(p.status)}`;

    const priceWrap = document.getElementById('modalPriceWrap');
    if (p.price) {
      document.getElementById('modalPrice').textContent = '$' + Number(p.price).toLocaleString();
      priceWrap.style.display = 'block';
    } else {
      priceWrap.style.display = 'none';
    }

    const notesEl = document.getElementById('modalNotes');
    if (p.notes) { notesEl.textContent = p.notes; notesEl.style.display = 'block'; }
    else { notesEl.style.display = 'none'; }

    document.getElementById('detailModal').classList.add('open');
  }

  function closeModal() { document.getElementById('detailModal').classList.remove('open'); }

  function editCurrent() {
    closeModal();
    openForm(currentIdx);
  }

  function deleteCurrent() {
    if (!confirm('Delete "' + paintings[currentIdx].title + '"?')) return;
    paintings.splice(currentIdx, 1);
    save(); renderAll(); closeModal();
    showToast('Deleted');
  }

  function openForm(idx) {
    editingId = idx !== undefined ? idx : null;
    document.getElementById('formHeading').textContent = editingId !== null ? 'Edit Painting' : 'Add Painting';

    if (editingId !== null) {
      const p = paintings[editingId];
      document.getElementById('fTitle').value      = p.title || '';
      document.getElementById('fYear').value       = p.year || '';
      document.getElementById('fStatus').value     = p.status || 'available';
      document.getElementById('fMedium').value     = p.medium || '';
      document.getElementById('fDimensions').value = p.dimensions || '';
      document.getElementById('fPrice').value      = p.price || '';
      document.getElementById('fImage').value      = p.image || '';
      document.getElementById('fNotes').value      = p.notes || '';
    } else {
      ['fTitle','fYear','fMedium','fDimensions','fPrice','fImage','fNotes'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('fStatus').value = 'available';
    }

    document.getElementById('formOverlay').classList.add('open');
    document.getElementById('fTitle').focus();
  }

  function closeForm() { document.getElementById('formOverlay').classList.remove('open'); }

  function savePainting() {
    const title = document.getElementById('fTitle').value.trim();
    if (!title) { document.getElementById('fTitle').focus(); return; }

    const p = {
      id:         editingId !== null ? paintings[editingId].id : Date.now(),
      title,
      year:       document.getElementById('fYear').value || '',
      status:     document.getElementById('fStatus').value,
      medium:     document.getElementById('fMedium').value.trim(),
      dimensions: document.getElementById('fDimensions').value.trim(),
      price:      document.getElementById('fPrice').value || '',
      image:      document.getElementById('fImage').value.trim(),
      notes:      document.getElementById('fNotes').value.trim(),
    };

    if (editingId !== null) paintings[editingId] = p;
    else paintings.unshift(p);

    save(); renderAll(); closeForm();
    showToast(editingId !== null ? 'Updated' : 'Painting added');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // Close modals on overlay click
  document.getElementById('detailModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
  document.getElementById('formOverlay').addEventListener('click', function(e) { if (e.target === this) closeForm(); });

  // Keyboard: Escape closes
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeForm(); } });

  renderAll();
</script>
</body>
</html>
